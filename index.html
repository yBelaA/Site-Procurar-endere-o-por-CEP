<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Hello Kitty - Busca de Endereço 🌸</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Cabeçalho com Hello Kitty -->
        <div class="header">
            <img src="https://i.imgur.com/7YQqMkM.png" alt="Hello Kitty" class="hello-kitty-img">
            <h1>🌸 Busca de Endereço da Hello Kitty 🌸</h1>
            <p class="subtitle">Digite um CEP e descubra onde a magia acontece! ✨</p>
        </div>

        <!-- Nuvens decorativas -->
        <div class="cloud cloud-1">☁️</div>
        <div class="cloud cloud-2">☁️</div>
        <div class="cloud cloud-3">☁️</div>

        <div class="search-box">
            <label for="cep">🎀 Digite o CEP mágico:</label>
            <div class="input-group">
                <input type="text" id="cep" placeholder="Ex: 01001-000" maxlength="9">
                <button onclick="buscarEndereco()">
                    <span class="button-text">Buscar</span>
                    <span class="button-icon">🐾</span>
                </button>
            </div>
            <p class="helper-text">Digite 8 números (com ou sem hífen)</p>
        </div>

        <div class="result-box" id="resultado">
            <div class="result-header">
                <h2>🎀 Resultado da Busca 🎀</h2>
                <span class="heart">❤️</span>
            </div>
            
            <div id="dados-endereco" class="endereco-dados">
                <!-- Os dados serão preenchidos aqui pelo JavaScript -->
            </div>

            <!-- Mensagem de carregamento (inicialmente oculta) -->
            <div id="loading" class="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p>Buscando endereço... 🎀</p>
            </div>

            <!-- Área da Hello Kitty decorativa -->
            <div class="hello-kitty-decor">
                <div class="decor-item">🐱</div>
                <div class="decor-item">🎀</div>
                <div class="decor-item">🌸</div>
                <div class="decor-item">🐾</div>
                <div class="decor-item">❤️</div>
                <div class="decor-item">🍪</div>
            </div>
        </div>

        <!-- Rodapé fofo -->
        <div class="footer">
            <p>Feito com 🩷 para os fãs da Hello Kitty</p>
            <p class="footer-emoji">🌸 🎀 🐱 🎀 🌸</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
